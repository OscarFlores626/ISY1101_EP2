server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Necesario para React Router: cualquier ruta que no sea un archivo
    # estático redirige al index.html para que React maneje el routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash (JS, CSS generados por Vite).
    # Vite incluye el hash del contenido en el nombre del archivo,
    # así que podemos cachearlos indefinidamente.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cachear el index.html para que siempre sirva la versión más reciente
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy hacia el backend de Ventas (subred privada AWS)
    # El frontend llama a /api/ventas/* y Nginx lo redirige al backend
    location /api/v1/ventas/ {
        proxy_pass http://back-ventas:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy hacia el backend de Despachos (subred privada AWS)
    location /api/v1/despachos/ {
        proxy_pass http://back-despachos:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Páginas de error personalizadas
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
