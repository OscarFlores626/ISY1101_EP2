name: CI/CD — Innovatech Chile ET

on:
  push:
    branches:
      - main

  # Permite ejecutar el pipeline manualmente desde GitHub Actions.
  # Util para rotar credenciales AWS sin necesidad de hacer un cambio en el codigo.
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del redeploy'
        required: false
        default: 'Redeploy manual'

      service:
        description: 'Servicio a redesplegar'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - back-ventas
          - back-despachos
          - front-despacho

# Evita que dos ejecuciones del pipeline corran al mismo tiempo sobre el mismo ambiente.
# Si se dispara un segundo pipeline mientras uno esta corriendo, espera en vez de cancelarlo,
# para no dejar el ambiente en un estado inconsistente.
concurrency:
  group: deploy-main
  cancel-in-progress: false

# Variables de entorno disponibles en todos los jobs.
# IMAGE_TAG usa el SHA del commit como identificador unico de la imagen Docker,
# permitiendo trazabilidad exacta entre el codigo fuente y lo que esta desplegado.
env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # =========================================================
  # BUILD — back-ventas
  # Los tres jobs de build corren en paralelo para reducir
  # el tiempo total del pipeline.
  # =========================================================
  build-back-ventas:
    name: Build & Push — back-ventas
    runs-on: ubuntu-latest

    # Este job corre si el trigger es un push a main,
    # o si se selecciono 'all' o 'back-ventas' en la ejecucion manual.
    if: >
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'back-ventas'

    steps:
      # Descarga el codigo fuente del repositorio en el runner de GitHub Actions.
      - name: Checkout codigo
        uses: actions/checkout@v4

      # Configura las credenciales AWS temporales de Academy usando GitHub Secrets,
      # evitando exponer datos sensibles directamente en el codigo del pipeline.
      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # Autentica el runner de GitHub Actions contra Amazon ECR
      # para poder publicar las imagenes Docker en el registro privado.
      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Crea el repositorio ECR si no existe.
      # Esto hace el pipeline idempotente: funciona tanto en la primera ejecucion
      # como en las siguientes sin errores.
      - name: Crear repo ECR si no existe
        run: |
          aws ecr describe-repositories \
            --repository-names innovatech/back-ventas \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name innovatech/back-ventas \
            --region $AWS_REGION

      # Construye la imagen Docker usando el Dockerfile multi-stage del servicio
      # y la publica en ECR con dos tags:
      # - SHA del commit: para trazabilidad exacta entre codigo e imagen
      # - latest: para referencia rapida a la version mas reciente
      - name: Build y Push
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST
        run: |
          docker build \
            -t $ECR_REGISTRY/innovatech/back-ventas:$IMAGE_TAG \
            -t $ECR_REGISTRY/innovatech/back-ventas:latest \
            .

          docker push $ECR_REGISTRY/innovatech/back-ventas:$IMAGE_TAG
          docker push $ECR_REGISTRY/innovatech/back-ventas:latest

  # =========================================================
  # BUILD — back-despachos
  # Mismo patron que back-ventas, corre en paralelo.
  # =========================================================
  build-back-despachos:
    name: Build & Push — back-despachos
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'back-despachos'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repo ECR si no existe
        run: |
          aws ecr describe-repositories \
            --repository-names innovatech/back-despachos \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name innovatech/back-despachos \
            --region $AWS_REGION

      - name: Build y Push
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: |
          docker build \
            -t $ECR_REGISTRY/innovatech/back-despachos:$IMAGE_TAG \
            -t $ECR_REGISTRY/innovatech/back-despachos:latest \
            .

          docker push $ECR_REGISTRY/innovatech/back-despachos:$IMAGE_TAG
          docker push $ECR_REGISTRY/innovatech/back-despachos:latest

  # =========================================================
  # BUILD — front-despacho
  # Mismo patron, corre en paralelo con los backends.
  # =========================================================
  build-front-despacho:
    name: Build & Push — front-despacho
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'front-despacho'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repo ECR si no existe
        run: |
          aws ecr describe-repositories \
            --repository-names innovatech/front-despacho \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name innovatech/front-despacho \
            --region $AWS_REGION

      # Se pasa la URL del frontend como build argument para que Vite
      # la incluya en el bundle compilado durante el proceso de build.
      - name: Build y Push
        working-directory: front_despacho
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ vars.FRONTEND_API_BASE_URL }} \
            -t $ECR_REGISTRY/innovatech/front-despacho:$IMAGE_TAG \
            -t $ECR_REGISTRY/innovatech/front-despacho:latest \
            .

          docker push $ECR_REGISTRY/innovatech/front-despacho:$IMAGE_TAG
          docker push $ECR_REGISTRY/innovatech/front-despacho:latest

  # =========================================================
  # DEPLOY — BACKEND via ECS Fargate
  # Espera que ambos builds de backend terminen exitosamente.
  # Actualiza los servicios ECS para que descarguen y ejecuten
  # las nuevas imagenes publicadas en ECR.
  # =========================================================
  deploy-backend:
    name: Deploy — ECS Backend
    runs-on: ubuntu-latest

    needs:
      - build-back-ventas
      - build-back-despachos

    if: always() &&
      needs.build-back-ventas.result == 'success' &&
      needs.build-back-despachos.result == 'success'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # Le indica a ECS que reemplace los tasks en ejecucion con nuevos tasks
      # que usan la imagen mas reciente publicada en ECR.
      # ECS se encarga de hacer el pull desde ECR, detener los tasks anteriores
      # y levantar los nuevos sin tiempo de inactividad.
      - name: Deploy backend via ECS
        run: |
          aws ecs update-service \
            --cluster innovatech-cluster \
            --service back-ventas \
            --task-definition innovatech-back-ventas \
            --force-new-deployment \
            --region $AWS_REGION

          aws ecs update-service \
            --cluster innovatech-cluster \
            --service back-despachos \
            --task-definition innovatech-back-despachos \
            --force-new-deployment \
            --region $AWS_REGION

          # Espera hasta que ambos servicios completen el despliegue
          # antes de continuar con el deploy del frontend.
          aws ecs wait services-stable \
            --cluster innovatech-cluster \
            --services back-ventas back-despachos \
            --region $AWS_REGION

          echo "Backend desplegado correctamente en ECS Fargate"

  # =========================================================
  # DEPLOY — FRONTEND via ECS Fargate
  # Espera que el build del frontend Y el deploy del backend
  # terminen antes de ejecutar. Garantiza que los backends
  # esten disponibles cuando el frontend comience a recibir trafico.
  # =========================================================
  deploy-frontend:
    name: Deploy — ECS Frontend
    runs-on: ubuntu-latest

    needs:
      - build-front-despacho
      - deploy-backend

    if: always() &&
      needs.build-front-despacho.result == 'success' &&
      needs.deploy-backend.result == 'success'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # Actualiza el servicio ECS del frontend con la nueva imagen.
      # Fargate descarga la imagen desde ECR y reemplaza el task anterior
      # sin necesidad de SSH ni acceso directo a la instancia.
      - name: Deploy frontend via ECS
        run: |
          aws ecs update-service \
            --cluster innovatech-cluster \
            --service front-despacho \
            --task-definition innovatech-front-despacho \
            --force-new-deployment \
            --region $AWS_REGION

          # Espera hasta que el servicio complete el despliegue
          # antes de validar que el frontend responde correctamente.
          aws ecs wait services-stable \
            --cluster innovatech-cluster \
            --services front-despacho \
            --region $AWS_REGION

          echo "Deploy completado"
