name: CI/CD — Innovatech Chile EP2

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del redeploy'
        required: false
        default: 'Redeploy manual'

      service:
        description: 'Servicio a redesplegar'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - back-ventas
          - back-despachos
          - front-despacho

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # =========================================================
  # BUILD — back-ventas
  # =========================================================
  build-back-ventas:
    name: Build & Push — back-ventas
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'back-ventas'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repo ECR si no existe
        run: |
          aws ecr describe-repositories \
            --repository-names innovatech/back-ventas \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name innovatech/back-ventas \
            --region $AWS_REGION

      - name: Build y Push
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST
        run: |
          docker build \
            -t $ECR_REGISTRY/innovatech/back-ventas:$IMAGE_TAG \
            -t $ECR_REGISTRY/innovatech/back-ventas:latest \
            .

          docker push $ECR_REGISTRY/innovatech/back-ventas:$IMAGE_TAG
          docker push $ECR_REGISTRY/innovatech/back-ventas:latest

  # =========================================================
  # BUILD — back-despachos
  # =========================================================
  build-back-despachos:
    name: Build & Push — back-despachos
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'back-despachos'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repo ECR si no existe
        run: |
          aws ecr describe-repositories \
            --repository-names innovatech/back-despachos \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name innovatech/back-despachos \
            --region $AWS_REGION

      - name: Build y Push
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: |
          docker build \
            -t $ECR_REGISTRY/innovatech/back-despachos:$IMAGE_TAG \
            -t $ECR_REGISTRY/innovatech/back-despachos:latest \
            .

          docker push $ECR_REGISTRY/innovatech/back-despachos:$IMAGE_TAG
          docker push $ECR_REGISTRY/innovatech/back-despachos:latest

  # =========================================================
  # BUILD — front-despacho
  # =========================================================
  build-front-despacho:
    name: Build & Push — front-despacho
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'front-despacho'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repo ECR si no existe
        run: |
          aws ecr describe-repositories \
            --repository-names innovatech/front-despacho \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name innovatech/front-despacho \
            --region $AWS_REGION

      - name: Build y Push
        working-directory: front_despacho
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ vars.FRONTEND_API_BASE_URL }} \
            -t $ECR_REGISTRY/innovatech/front-despacho:$IMAGE_TAG \
            -t $ECR_REGISTRY/innovatech/front-despacho:latest \
            .

          docker push $ECR_REGISTRY/innovatech/front-despacho:$IMAGE_TAG
          docker push $ECR_REGISTRY/innovatech/front-despacho:latest

  # =========================================================
  # DEPLOY — BACKEND
  # =========================================================
  deploy-backend:
    name: Deploy — EC2 Backend
    runs-on: ubuntu-latest

    needs:
      - build-back-ventas
      - build-back-despachos

    if: always() &&
      needs.build-back-ventas.result == 'success' &&
      needs.build-back-despachos.result == 'success'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend via SSM
        run: |

          COMPOSE_B64=$(base64 -w 0 docker-compose.backend.yml)

          ENV_CONTENT="AWS_ACCOUNT_ID=${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION=${{ env.AWS_REGION }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          DB_ENDPOINT=${{ vars.DB_ENDPOINT }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_NAME_VENTAS=${{ vars.DB_NAME_VENTAS }}
          DB_NAME_DESPACHOS=${{ vars.DB_NAME_DESPACHOS }}
          DB_USERNAME=${{ vars.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}"

          ENV_B64=$(echo "$ENV_CONTENT" | base64 -w 0)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_BACKEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"set -ex\",
              \"docker --version\",
              \"docker compose version || true\",
              \"docker-compose version || true\",
              \"echo $COMPOSE_B64 | base64 -d > /home/ec2-user/docker-compose.backend.yml\",
              \"echo $ENV_B64 | base64 -d > /home/ec2-user/.env\",
              \"cat /home/ec2-user/.env\",
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY\",
              \"docker-compose -f /home/ec2-user/docker-compose.backend.yml --env-file /home/ec2-user/.env pull\",
              \"docker-compose -f /home/ec2-user/docker-compose.backend.yml --env-file /home/ec2-user/.env up -d --remove-orphans\",
              \"docker ps -a\",
              \"docker image prune -f\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

            echo "COMMAND_ID=$COMMAND_ID"
            
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ vars.EC2_BACKEND_INSTANCE_ID }}" || true
            
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ vars.EC2_BACKEND_INSTANCE_ID }}" \
              --output json
            
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ vars.EC2_BACKEND_INSTANCE_ID }}" \
              --query 'Status' \
              --output text)
            
            echo "STATUS=$STATUS"
             [ "$STATUS" != "Success" ]; then
              e
            ifxit 1
            fi

  # =========================================================
  # DEPLOY — FRONTEND
  # =========================================================
  deploy-frontend:
    name: Deploy — EC2 Frontend
    runs-on: ubuntu-latest

    needs:
      - build-front-despacho
      - deploy-backend

    if: always() &&
      needs.build-front-despacho.result == 'success' &&
      needs.deploy-backend.result == 'success'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy frontend via SSM
        run: |

          COMPOSE_B64=$(base64 -w 0 docker-compose.frontend.yml)

          ENV_CONTENT="AWS_ACCOUNT_ID=${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION=${{ env.AWS_REGION }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          BACKEND_PRIVATE_IP=${{ vars.EC2_BACKEND_PRIVATE_IP }}"

          ENV_B64=$(echo "$ENV_CONTENT" | base64 -w 0)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_FRONTEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"set -ex\",
              \"docker --version\",
              \"docker compose version || true\",
              \"docker-compose version || true\",
              \"echo $COMPOSE_B64 | base64 -d > /home/ec2-user/docker-compose.frontend.yml\",
              \"echo $ENV_B64 | base64 -d > /home/ec2-user/.env.frontend\",
              \"cat /home/ec2-user/.env.frontend\",
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY\",
              \"docker-compose -f /home/ec2-user/docker-compose.frontend.yml --env-file /home/ec2-user/.env.frontend pull\",
              \"docker-compose -f /home/ec2-user/docker-compose.frontend.yml --env-file /home/ec2-user/.env.frontend up -d --remove-orphans\",
              \"docker ps -a\",
              \"docker logs front-despacho || true\",
              \"docker image prune -f\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID"
          
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_BACKEND_INSTANCE_ID }}" || true
          
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_BACKEND_INSTANCE_ID }}" \
            --output json
          
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_BACKEND_INSTANCE_ID }}" \
            --query 'Status' \
            --output text)
          
          echo "STATUS=$STATUS"
          
          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi

      - name: Validar Frontend
        run: |
          sleep 20

          curl -v http://${{ vars.EC2_FRONTEND_PUBLIC_IP }}

      - name: Resumen
        run: |
          echo "Deploy completado"
