name: CI/CD — Innovatech Chile EP2

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del redeploy'
        required: false
        default: 'Redeploy manual'
      service:
        description: 'Servicio a redesplegar'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - back-ventas
          - back-despachos
          - front-despacho

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ───────────────────────────────────────────────────────────
  # JOB 1: BUILD Y PUSH — back-ventas
  # ───────────────────────────────────────────────────────────
  build-back-ventas:
    name: Build & Push — back-ventas
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'back-ventas'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repositorio ECR si no existe
        run: |
          aws ecr describe-repositories \
            --repository-names innovatech/back-ventas \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name innovatech/back-ventas \
            --region ${{ env.AWS_REGION }}

      - name: Build y Push imagen back-ventas
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/innovatech/back-ventas:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/innovatech/back-ventas:latest \
            .
          docker push ${{ env.ECR_REGISTRY }}/innovatech/back-ventas:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/innovatech/back-ventas:latest

  # ───────────────────────────────────────────────────────────
  # JOB 2: BUILD Y PUSH — back-despachos
  # ───────────────────────────────────────────────────────────
  build-back-despachos:
    name: Build & Push — back-despachos
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'back-despachos'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repositorio ECR si no existe
        run: |
          aws ecr describe-repositories \
            --repository-names innovatech/back-despachos \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name innovatech/back-despachos \
            --region ${{ env.AWS_REGION }}

      - name: Build y Push imagen back-despachos
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/innovatech/back-despachos:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/innovatech/back-despachos:latest \
            .
          docker push ${{ env.ECR_REGISTRY }}/innovatech/back-despachos:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/innovatech/back-despachos:latest

  # ───────────────────────────────────────────────────────────
  # JOB 3: BUILD Y PUSH — front-despacho
  # ───────────────────────────────────────────────────────────
  build-front-despacho:
    name: Build & Push — front-despacho
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'front-despacho'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repositorio ECR si no existe
        run: |
          aws ecr describe-repositories \
            --repository-names innovatech/front-despacho \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name innovatech/front-despacho \
            --region ${{ env.AWS_REGION }}

      - name: Build y Push imagen front-despacho
        working-directory: front_despacho
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ vars.FRONTEND_API_BASE_URL }} \
            -t ${{ env.ECR_REGISTRY }}/innovatech/front-despacho:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/innovatech/front-despacho:latest \
            .
          docker push ${{ env.ECR_REGISTRY }}/innovatech/front-despacho:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/innovatech/front-despacho:latest

  # ───────────────────────────────────────────────────────────
  # JOB 4: DEPLOY — EC2 Backend via SSM
  # ───────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy — EC2 Backend
    runs-on: ubuntu-latest
    needs: [build-back-ventas, build-back-despachos]
    if: always() && needs.build-back-ventas.result == 'success' && needs.build-back-despachos.result == 'success'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copiar docker-compose y hacer deploy via SSM
        run: |
          COMPOSE_B64=$(base64 -w 0 docker-compose.backend.yml)

          ENV_CONTENT="AWS_ACCOUNT_ID=${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION=${{ env.AWS_REGION }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          DB_ENDPOINT=${{ vars.DB_ENDPOINT }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_NAME_VENTAS=${{ vars.DB_NAME_VENTAS }}
          DB_NAME_DESPACHOS=${{ vars.DB_NAME_DESPACHOS }}
          DB_USERNAME=${{ vars.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
                    ENV_B64=$(echo "$ENV_CONTENT" | base64 -w 0)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_BACKEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"set -e\",
              \"echo $COMPOSE_B64 | base64 -d > /home/ec2-user/docker-compose.backend.yml\",
              \"echo $ENV_B64 | base64 -d > /home/ec2-user/.env\",
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}\",
              \"docker compose -f /home/ec2-user/docker-compose.backend.yml --env-file /home/ec2-user/.env pull\",
              \"docker compose -f /home/ec2-user/docker-compose.backend.yml --env-file /home/ec2-user/.env up -d --remove-orphans\",
              \"docker image prune -f\",
              \"echo Deploy backend completado\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_BACKEND_INSTANCE_ID }}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_BACKEND_INSTANCE_ID }}" \
            --query 'Status' --output text)

          echo "Estado: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ vars.EC2_BACKEND_INSTANCE_ID }}" \
              --query 'StandardErrorContent'
            exit 1
          fi

  # ───────────────────────────────────────────────────────────
  # JOB 5: DEPLOY — EC2 Frontend via SSM
  # ───────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy — EC2 Frontend
    runs-on: ubuntu-latest
    needs: [build-front-despacho, deploy-backend]
    if: always() && needs.build-front-despacho.result == 'success' && needs.deploy-backend.result == 'success'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copiar docker-compose y hacer deploy via SSM
        run: |
          COMPOSE_B64=$(base64 -w 0 docker-compose.frontend.yml)

          ENV_CONTENT="AWS_ACCOUNT_ID=${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION=${{ env.AWS_REGION }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          BACKEND_PRIVATE_IP=${{ vars.EC2_BACKEND_PRIVATE_IP }}"
                    ENV_B64=$(echo "$ENV_CONTENT" | base64 -w 0)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_FRONTEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"set -e\",
              \"echo $COMPOSE_B64 | base64 -d > /home/ec2-user/docker-compose.frontend.yml\",
              \"echo $ENV_B64 | base64 -d > /home/ec2-user/.env.frontend\",
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}\",
              \"docker compose -f /home/ec2-user/docker-compose.frontend.yml --env-file /home/ec2-user/.env.frontend pull\",
              \"docker compose -f /home/ec2-user/docker-compose.frontend.yml --env-file /home/ec2-user/.env.frontend up -d --remove-orphans\",
              \"docker image prune -f\",
              \"echo Deploy frontend completado\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_FRONTEND_INSTANCE_ID }}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_FRONTEND_INSTANCE_ID }}" \
            --query 'Status' --output text)

          echo "Estado: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ vars.EC2_FRONTEND_INSTANCE_ID }}" \
              --query 'StandardErrorContent'
            exit 1
          fi

      - name: Verificar que el Frontend responde
        run: |
          sleep 15
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ vars.EC2_FRONTEND_PUBLIC_IP }})
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Frontend no responde (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Resumen final del pipeline
        run: |
          echo "## Deploy completo — Innovatech Chile" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | Estado | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| front-despacho | OK | http://${{ vars.EC2_FRONTEND_PUBLIC_IP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| back-ventas | OK | Privado :8080 |" >> $GITHUB_STEP_SUMMARY
          echo "| back-despachos | OK | Privado :8081 |" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "**Motivo:** ${{ github.event.inputs.reason || 'Push a main' }}" >> $GITHUB_STEP_SUMMARY
